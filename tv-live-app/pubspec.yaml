name: mini_tv_live
description: 辉哥定制 - 迷你电视直播应用 (体积<10MB)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # 视频播放器 (轻量级)
  video_player: ^2.8.2
  chewie: ^1.7.5
  # HTTP 请求
  http: ^1.1.0
  # 状态管理 (轻量)
  provider: ^6.1.1
  # 本地存储
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  # 资源文件
  assets:
    - assets/config/
    - assets/images/
  
  # 字体优化 (可选)
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: fonts/Roboto-Regular.ttf

# 体积优化配置
flutter_build:
  split-per-abi: true
  tree-shake-icons: true
